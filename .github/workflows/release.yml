name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Zip dist
        run: |
          cd dist
          zip -r ../resumify-${{ github.ref_name }}.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Resumify ${{ github.ref_name }}
          body: |
            ## Resumify ${{ github.ref_name }}

            Open-source resume builder — ATS-friendly, bilingual, and fully offline.

            ### Install & run
            ```bash
            npm install
            npm run dev
            ```

            ### Static build
            Download `resumify-${{ github.ref_name }}.zip`, extract, and serve the contents with any static host.
          files: resumify-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
