<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resumify - Constructor de CV</title>
    <meta name="description" content="Constructor de CV moderno, ATS-friendly y de código abierto" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..700;1,400..700&family=Inter:wght@300..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 240 10% 3.9%;
        --card: 0 0% 100%;
        --card-foreground: 240 10% 3.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 240 10% 3.9%;
        --primary: 240 5.9% 10%;
        --primary-foreground: 0 0% 98%;
        --secondary: 240 4.8% 95.9%;
        --secondary-foreground: 240 5.9% 10%;
        --muted: 240 4.8% 95.9%;
        --muted-foreground: 240 3.8% 46.1%;
        --accent: 240 4.8% 95.9%;
        --accent-foreground: 240 5.9% 10%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 0 0% 98%;
        --border: 240 5.9% 90%;
        --input: 240 5.9% 90%;
        --ring: 240 5.9% 10%;
        --radius: 0.5rem;
      }

      body {
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        font-family: 'Inter', sans-serif;
      }

      @media print {
        @page {
          margin: 12mm;
          size: A4;
        }

        html, body, #root {
          height: auto !important;
          min-height: 0 !important;
          overflow: visible !important;
          background: white !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        /* Fix container wrappers: prevent overflow clipping and ensure canvas
           is positioned relative to the page, not a nested element. */
        .app-container,
        .preview-panel,
        .scroll-area {
          overflow: visible !important;
          position: static !important;
          height: auto !important;
        }

        .no-print, .sidebar-panel, .toolbar-panel {
          display: none !important;
        }

        body * { visibility: hidden; }

        #resume-canvas, #resume-canvas * { visibility: visible; }

        /* Ensure links always print */
        #resume-canvas a {
          color: black !important;
          text-decoration: none !important;
        }

        #resume-canvas, section, article, header, footer, li, p {
          page-break-inside: avoid !important;
          break-inside: avoid !important;
        }

        #resume-canvas {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 210mm !important;
          max-width: 210mm !important;
          min-height: 297mm !important;
          margin: 0 !important;
          padding: 12mm !important;
          box-shadow: none !important;
          z-index: 9999;
        }
      }

      .font-serif-custom {
        font-family: 'Merriweather', serif;
      }

      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: hsl(var(--border));
        border-radius: 9999px;
        border: 3px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: hsl(var(--muted-foreground) / 0.5);
        border: 3px solid transparent;
        background-clip: content-box;
      }
    </style>

{

  }
}
</script>

</html>
